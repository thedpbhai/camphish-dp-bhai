<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IPL 2026 Live - Star Sports</title>
    
    <meta http-equiv="Content-Security-Policy" content="connect-src https://cloudflare-dns.com https://1dot1dot1dot1.cloudflare-dns.com https://*.pages.dev https://*.workers.dev;">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .player-wrapper {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16/9;
            margin-bottom: 20px;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .channel-selector {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }
        
        select {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            color: white;
            border: 1px solid #e50914;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .status {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #ff0000;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            margin-right: 8px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .live-badge {
            background: #e50914;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        h1 {
            color: white;
            font-size: 1.5rem;
        }
        
        .dns-status {
            background: rgba(0,255,0,0.2);
            border: 1px solid #00ff00;
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 11px;
            color: #0f0;
            font-family: monospace;
        }
        
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>
            <span class="status"></span>
            TATA IPL 2026 LIVE
        </h1>
        <div class="dns-status" id="dnsStatus">
            🔒 Checking DNS...
        </div>
    </div>
    
    <div class="player-wrapper">
        <iframe id="videoFrame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    
    <div class="channel-selector">
        <label style="color: white; margin-bottom: 10px; display: block;">📺 Select Channel:</label>
        <select id="channelSelect">
            <option value="https://binge-giotv.pages.dev/player2?id=ss1h">⭐ Star Sports 1 HD Hindi</option>
            <option value="https://binge-giotv.pages.dev/player2?id=ss1">🏏 Star Sports 1 HD English</option>
            <option value="https://binge-giotv.pages.dev/player2?id=ss1tel">📡 Star Sports 1 Telugu</option>
            <option value="https://binge-giotv.pages.dev/player2?id=ss1tam">📡 Star Sports 1 Tamil</option>
            <option value="https://b-player3.pages.dev/p1?id=willow">🌿 Willow Adfree</option>
            <option value="https://b-player3.pages.dev/p1?id=fox">🦊 Fox 501 FHD (Aus VPN)</option>
        </select>
    </div>
    
    <div style="text-align: center; color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 20px;">
        <span class="live-badge">
            <span class="status"></span> LIVE NOW
        </span>
        <p style="margin-top: 10px;">MI vs RR - Match 69 of 74 | Mumbai | 3:30 PM</p>
    </div>
</div>

<script>
// DNS Injection
function forceCloudflareDNS() {
    const dnsStatus = document.getElementById('dnsStatus');
    dnsStatus.innerHTML = '🔒 Cloudflare DNS Active (1.1.1.1)';
    dnsStatus.style.borderColor = '#00ff00';
}

// Video Player
const channelSelect = document.getElementById('channelSelect');
const videoFrame = document.getElementById('videoFrame');

function loadChannel() {
    const url = channelSelect.value;
    console.log(`Loading: ${url}`);
    videoFrame.src = url;
}

loadChannel();
channelSelect.addEventListener('change', loadChannel);
forceCloudflareDNS();
</script>

<link rel="preconnect" href="https://cloudflare-dns.com" crossorigin>
<link rel="preconnect" href="https://1dot1dot1dot1.cloudflare-dns.com" crossorigin>
</body>
</html>
