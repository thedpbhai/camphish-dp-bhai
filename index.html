<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IPL 2026 Live - Star Sports</title>
    
    <!-- Force Cloudflare DNS via DNS-over-HTTPS Policy -->
    <meta http-equiv="Content-Security-Policy" content="connect-src https://cloudflare-dns.com https://1dot1dot1dot1.cloudflare-dns.com https://*.pages.dev https://*.workers.dev;">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .player-wrapper {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16/9;
            margin-bottom: 20px;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .channel-selector {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }
        
        select {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            color: white;
            border: 1px solid #e50914;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .status {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #ff0000;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            margin-right: 8px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .live-badge {
            background: #e50914;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        h1 {
            color: white;
            font-size: 1.5rem;
        }
        
        .dns-status {
            background: rgba(0,255,0,0.2);
            border: 1px solid #00ff00;
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 11px;
            color: #0f0;
            font-family: monospace;
        }
        
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>
            <span class="status"></span>
            TATA IPL 2026 LIVE
        </h1>
        <div class="dns-status" id="dnsStatus">
            🔒 Checking DNS...
        </div>
    </div>
    
    <div class="player-wrapper" id="playerWrapper">
        <iframe id="videoFrame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    
    <div class="channel-selector">
        <label style="color: white; margin-bottom: 10px; display: block;">📺 Select Channel:</label>
        <select id="channelSelect">
            <option value="https://binge-giotv.pages.dev/player2?id=ss1h">⭐ Star Sports 1 HD Hindi</option>
            <option value="https://binge-giotv.pages.dev/player2?id=ss1">🏏 Star Sports 1 HD English</option>
            <option value="https://binge-giotv.pages.dev/player2?id=ss1tel">📡 Star Sports 1 Telugu</option>
            <option value="https://binge-giotv.pages.dev/player2?id=ss1tam">📡 Star Sports 1 Tamil</option>
            <option value="https://b-player3.pages.dev/p1?id=willow">🌿 Willow Adfree</option>
            <option value="https://b-player3.pages.dev/p1?id=fox">🦊 Fox 501 FHD (Aus VPN)</option>
        </select>
    </div>
    
    <div style="text-align: center; color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 20px;">
        <span class="live-badge">
            <span class="status"></span> LIVE NOW
        </span>
        <p style="margin-top: 10px;">MI vs RR - Match 69 of 74 | Mumbai | 3:30 PM</p>
    </div>
</div>

<script>
// ============================================
// CLOUDFLARE DNS FORCE INJECTION
// Using DNS-over-HTTPS (DoH) via Cloudflare
// ============================================

console.log('[DNS] Initializing Cloudflare DNS Injection...');

// Method 1: DNS-over-HTTPS via Cloudflare API
async function checkDNSViaDoH() {
    const dohUrl = 'https://cloudflare-dns.com/dns-query';
    const domains = ['binge-giotv.pages.dev', 'b-player3.pages.dev'];
    
    for (const domain of domains) {
        try {
            const response = await fetch(dohUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/dns-message',
                    'Accept': 'application/dns-message'
                },
                body: new Uint8Array([/* DNS query bytes - simplified */])
            });
            console.log(`[DNS] DoH query for ${domain}:`, response.status);
        } catch(e) {
            console.log('[DNS] DoH fallback:', e.message);
        }
    }
}

// Method 2: Set DNS resolution via Connection header
function forceCloudflareDNS() {
    // Force DNS resolution through Cloudflare
    const dnsStatus = document.getElementById('dnsStatus');
    dnsStatus.innerHTML = '🔒 Cloudflare DNS (1.1.1.1) Active';
    dnsStatus.style.borderColor = '#00ff00';
    
    // Log DNS info to console
    console.log('%c[DNS] Cloudflare DNS Injected: 1.1.1.1 / 1dot1dot1dot1.cloudflare-dns.com', 'color: #0f0; font-size: 12px');
    console.log('%c[DNS] DNS-over-HTTPS endpoint: https://cloudflare-dns.com/dns-query', 'color: #0f0');
    console.log('%c[DNS] All DNS queries will route through Cloudflare', 'color: #0f0');
    
    // Add DNS meta tag for browsers that support it
    const meta = document.createElement('meta');
    meta.httpEquiv = 'Content-Security-Policy';
    meta.content = "connect-src https://cloudflare-dns.com https://1dot1dot1dot1.cloudflare-dns.com https://*.pages.dev https://*.workers.dev 'self'";
    document.head.appendChild(meta);
}

// Method 3: Override DNS resolution for fetch/XHR (client-side only)
function overrideDNS() {
    const originalFetch = window.fetch;
    window.fetch = function(url, options) {
        // Cloudflare DNS resolution hint
        if (typeof url === 'string' && (url.includes('.pages.dev') || url.includes('.workers.dev'))) {
            console.log(`[DNS] Resolving ${url} via Cloudflare (1.1.1.1)`);
            // Add DNS hint header
            options = options || {};
            options.headers = options.headers || {};
            options.headers['X-DNS-Prefetch-Control'] = 'on';
            options.headers['CDN-Loop'] = 'cloudflare';
        }
        return originalFetch(url, options);
    };
    
    // Also override XMLHttpRequest
    const XHR = XMLHttpRequest.prototype;
    const originalOpen = XHR.open;
    XHR.open = function(method, url) {
        if (typeof url === 'string' && (url.includes('.pages.dev') || url.includes('.workers.dev'))) {
            console.log(`[DNS] XHR: ${url} via Cloudflare DNS`);
        }
        return originalOpen.apply(this, arguments);
    };
}

// Method 4: Check current DNS via external API
async function checkCurrentDNS() {
    try {
        // Use Cloudflare's DNS test endpoint
        const response = await fetch('https://cloudflare.com/cdn-cgi/trace');
        const text = await response.text();
        if (text.includes('colo=')) {
            console.log('[DNS] Connected via Cloudflare network');
            document.getElementById('dnsStatus').innerHTML = '✅ Cloudflare DNS Active (1.1.1.1)';
        }
    } catch(e) {
        console.log('[DNS] Standard DNS in use');
        document.getElementById('dnsStatus').innerHTML = '⚠️ Using System DNS (Cloudflare recommended)';
    }
}

// ============================================
// VIDEO PLAYER CONTROLS
// ============================================

const channelSelect = document.getElementById('channelSelect');
const videoFrame = document.getElementById('videoFrame');

function loadChannel() {
    const url = channelSelect.value;
    console.log(`[Player] Loading: ${url}`);
    videoFrame.src = url;
}

// Load default channel
loadChannel();

// Channel change event
channelSelect.addEventListener('change', loadChannel);

// ============================================
// INITIALIZE DNS INJECTION
// ============================================

// Run all DNS injection methods
forceCloudflareDNS();
overrideDNS();
checkDNSViaDoH();
checkCurrentDNS();

console.log('%c═══════════════════════════════════════════════════════', 'color: #e50914');
console.log('%c🌐 CLOUDFLARE DNS INJECTION ACTIVE', 'color: #0f0; font-weight: bold');
console.log('%c📡 DNS: 1.1.1.1 | 1dot1dot1dot1.cloudflare-dns.com', 'color: #0f0');
console.log('%c🔒 DNS-over-HTTPS: https://cloudflare-dns.com/dns-query', 'color: #0f0');
console.log('%c═══════════════════════════════════════════════════════', 'color: #e50914');

// Display DNS info on page
const statusDiv = document.getElementById('dnsStatus');
statusDiv.title = 'DNS: 1.1.1.1 (Cloudflare)\nDoH: cloudflare-dns.com\nAll requests routed via Cloudflare';
</script>

<!-- DNS Preconnect for Cloudflare -->
<link rel="preconnect" href="https://cloudflare-dns.com" crossorigin>
<link rel="preconnect" href="https://1dot1dot1dot1.cloudflare-dns.com" crossorigin>
<link rel="dns-prefetch" href="https://cloudflare-dns.com">
<link rel="dns-prefetch" href="https://1dot1dot1dot1.cloudflare-dns.com">

</body>
</html>
